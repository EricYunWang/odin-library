<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="new-book-button">
        <p>Welcome to the library, click the button to add a new book:</p>
        <button onclick="addBookFunction()">New Book</button>
    </div>
    <div id="container">
    </div>
    
    <div id="overlay"></div>
    <div id="add-book-popup">
        <form id="book-form" action="/Library" method="post"> 
            <label for="book-name">Book Name:</label>
            <input type="text" id="book-name" name="book-name" placeholder="To Kill a Mockingbird" required/>
            <label for="author-name">Author Name:</label>
            <input type="text" class="author-name" name="author-name" placeholder="Harper Lee" required/>
            <label for="page-number">Page Number:</label>
            <input type="number" class="page-number" name="page-number" placeholder="200"/>
            <label for="read">Read?:</label>
            <input type="checkbox" class="read" name="read" value="read" checked/>
            <button class="overlay-button" type="submit">Submit Info</button>
        </form>
            <button class="overlay-button" onclick="closeForm()">Close</button>
    </div>
</body>
</html>
